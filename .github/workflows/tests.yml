name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check src test

  # Browser-less registration guard across every supported Streamlit version.
  # Catches API drift like isolate_styles moving between the registration call
  # (>= 1.53) and the per-call renderer (1.51 / 1.52).
  smoke:
    name: Smoke (Streamlit ${{ matrix.streamlit || 'latest' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        streamlit: ['1.51.*', '1.52.*', '1.53.*', '1.54.*', '1.55.*', '1.56.*', '1.57.*', '1.58.*', '']
    steps:
      - uses: actions/checkout@v6

      # The conftest builds and installs the wheel; without a frontend build
      # the wheel ships no assets and component discovery cannot resolve
      # asset_dir, failing the smoke test on every Streamlit version.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/st_aggrid/frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: src/st_aggrid/frontend

      - uses: actions/setup-python@v6
        with: { python-version: '3.13' }
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Select Streamlit version
        run: |
          if [ -n "${{ matrix.streamlit }}" ]; then
            uv pip install "streamlit==${{ matrix.streamlit }}"
          else
            uv pip install -U streamlit
          fi
      - run: uv run --no-sync python -c "import streamlit; print('streamlit', streamlit.__version__)"
      - run: uv run --no-sync pytest test/test_registration_smoke.py -v

  e2e:
    name: CCv2 e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Frontend build is required: the test conftest builds the wheel via
      # `uv build`, and hatchling silently produces an empty wheel if
      # src/st_aggrid/frontend/build/ doesn't exist.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/st_aggrid/frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: src/st_aggrid/frontend

      - uses: actions/setup-python@v6
        with: { python-version: '3.13' }

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run e2e tests
        run: uv run pytest test/test_ccv2_e2e.py -v

      - name: Upload Playwright test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
